# CodeQL — semantic SAST from GitHub.
# Builds a data-flow graph and finds vulnerabilities that syntax-level
# linters (ESLint, oxlint) cannot detect: SQL injection (via Prisma raw
# queries), XSS (via dangerouslySetInnerHTML), SSRF in server actions,
# path traversal across function boundaries, hardcoded credentials.
# Docs: https://codeql.github.com/

name: CodeQL Analysis
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 8 * * 1' # every Monday at 08:00 UTC
  workflow_dispatch:

permissions: read-all

concurrency:
  cancel-in-progress: true
  group: codeql-${{ github.workflow }}-${{ github.ref }}

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      security-events: write # upload SARIF
      actions: read # for private repo dependency graph
      contents: read

    strategy:
      fail-fast: false
      matrix:
        language: [javascript-typescript]

    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Initialize CodeQL
        uses: github/codeql-action/init@e4fba868fa4b1b91e1fdab776edc8cfbe6e9fb81 # v4.37.3
        with:
          build-mode: none
          languages: ${{ matrix.language }}
          queries: security-extended,security-and-quality
          config: |
            paths-ignore:
              - '**/*.test.ts'
              - '**/*.test.tsx'
              - '**/*.spec.ts'
              - '**/*.spec.tsx'

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@e4fba868fa4b1b91e1fdab776edc8cfbe6e9fb81 # v4.37.3
        with:
          category: '/language:${{ matrix.language }}'
