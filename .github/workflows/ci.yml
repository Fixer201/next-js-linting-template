# CI — full quality gate on every push and PR.
# Mirrors the local quality commands: lint, typecheck, knip, prisma-validate, build.
# Uses pinned action SHAs and least-privilege permissions.
# Pattern: Microsoft TypeScript's ci.yml + OpenSSF recommendations.

name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  merge_group:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  lint:
    name: Lint (oxlint + ESLint)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.3
      - uses: actions/setup-node@1d0ff469b7ec7b3cb9d8673fde0c81c44821de2a # v4.3.0
        with:
          node-version: 22
          cache: npm
      - run: npm ci --legacy-peer-deps
      - run: npm run lint:ci

  typecheck:
    name: Type check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.3
      - uses: actions/setup-node@1d0ff469b7ec7b3cb9d8673fde0c81c44821de2a # v4.3.0
        with:
          node-version: 22
          cache: npm
      - run: npm ci --legacy-peer-deps
      - run: npm run db:generate
      - run: npm run typecheck

  knip:
    name: Dead code check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.3
      - uses: actions/setup-node@1d0ff469b7ec7b3cb9d8673fde0c81c44821de2a # v4.3.0
        with:
          node-version: 22
          cache: npm
      - run: npm ci --legacy-peer-deps
      - run: npm run db:generate
      - run: npm run knip

  prisma-validate:
    name: Prisma schema validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.3
      - uses: actions/setup-node@1d0ff469b7ec7b3cb9d8673fde0c81c44821de2a # v4.3.0
        with:
          node-version: 22
          cache: npm
      - run: npm ci --legacy-peer-deps
      - run: npm run db:validate
      - run: npm run db:generate

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.3
      - uses: actions/setup-node@1d0ff469b7ec7b3cb9d8673fde0c81c44821de2a # v4.3.0
        with:
          node-version: 22
          cache: npm
      - run: npm ci --legacy-peer-deps
      - run: npm run db:generate
      - run: npm run build

  # Aggregate gate — fails the merge if any required job was skipped
  # or failed. Prevents merging when CI silently passes because a job
  # was misconfigured or skipped by path filters.
  # Pattern: microsoft/TypeScript ci.yml
  required:
    name: All gates passed
    if: always()
    needs: [lint, typecheck, knip, prisma-validate, build]
    runs-on: ubuntu-latest
    steps:
      - name: Verify all gates
        run: |
          echo "lint: ${{ needs.lint.result }}"
          echo "typecheck: ${{ needs.typecheck.result }}"
          echo "knip: ${{ needs.knip.result }}"
          echo "prisma-validate: ${{ needs.prisma-validate.result }}"
          echo "build: ${{ needs.build.result }}"
          if [[ \
            "${{ needs.lint.result }}" != "success" || \
            "${{ needs.typecheck.result }}" != "success" || \
            "${{ needs.knip.result }}" != "success" || \
            "${{ needs.prisma-validate.result }}" != "success" || \
            "${{ needs.build.result }}" != "success" \
          ]]; then
            echo "❌ One or more required gates failed."
            exit 1
          fi
          echo "✅ All gates passed."
