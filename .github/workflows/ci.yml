name: CI

on:
  merge_group:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  cancel-in-progress: true
  group: ci-${{ github.workflow }}-${{ github.ref }}

permissions:
  contents: read

env:
  DATABASE_POOL_SIZE: '2'
  DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/next_template?schema=public
  NEXT_TELEMETRY_DISABLED: '1'
  PRISMA_LOG_QUERIES: 'false'

jobs:
  quality:
    name: Format, lint, types, tests, and dead code
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          cache: npm
          node-version: 24
      - run: npm ci
      - run: npm run db:generate
      - run: npm run format
      - run: npm run lint:ci
      - run: npm run typecheck
      - run: npm run test:coverage
      - run: npm run knip
      - run: npm run db:validate

  build:
    name: Production build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          cache: npm
          node-version: 24
      - run: npm ci
      - run: npm run build

  audit:
    name: Production dependency audit
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          cache: npm
          node-version: 24
      - run: npm audit --audit-level=moderate

  required:
    name: All gates passed
    if: always()
    needs: [audit, build, quality]
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Verify required jobs
        env:
          AUDIT_RESULT: ${{ needs.audit.result }}
          BUILD_RESULT: ${{ needs.build.result }}
          QUALITY_RESULT: ${{ needs.quality.result }}
        run: |
          if [[ "$AUDIT_RESULT" != 'success' || "$BUILD_RESULT" != 'success' || "$QUALITY_RESULT" != 'success' ]]; then
            echo 'One or more required jobs failed or were skipped.'
            exit 1
          fi
