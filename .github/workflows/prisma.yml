name: Prisma migration check

on:
  pull_request:
    branches: [main]
    paths:
      - 'package-lock.json'
      - 'package.json'
      - 'prisma.config.ts'
      - 'prisma/**'
  push:
    branches: [main]
    paths:
      - 'package-lock.json'
      - 'package.json'
      - 'prisma.config.ts'
      - 'prisma/**'
  schedule:
    - cron: '0 6 * * 1'
  workflow_dispatch:

concurrency:
  cancel-in-progress: true
  group: prisma-${{ github.workflow }}-${{ github.ref }}

permissions:
  contents: read

jobs:
  migrations:
    name: Apply migrations and verify schema
    runs-on: ubuntu-latest
    timeout-minutes: 15
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: next_template
          POSTGRES_PASSWORD: postgres
          POSTGRES_USER: postgres
        options: >-
          --health-cmd "pg_isready -U postgres -d next_template"
          --health-interval 2s
          --health-timeout 3s
          --health-retries 15
        ports:
          - 5432:5432
    env:
      DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/next_template?schema=public
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          cache: npm
          node-version: 24
      - run: npm ci
      - run: npm run db:generate
      - run: npm run db:validate
      - run: npm run db:migrate:deploy
      - run: npm run db:migrate:status
      - name: Verify migration history matches the schema
        run: npm run db:migrate:check
