name: Prisma migration check

on:
  pull_request:
    branches: [main]
    paths:
      - 'package-lock.json'
      - 'package.json'
      - 'prisma.config.ts'
      - 'prisma/**'
  push:
    branches: [main]
    paths:
      - 'package-lock.json'
      - 'package.json'
      - 'prisma.config.ts'
      - 'prisma/**'
  schedule:
    - cron: '0 6 * * 1'
  workflow_dispatch:

concurrency:
  cancel-in-progress: true
  group: prisma-${{ github.workflow }}-${{ github.ref }}

permissions:
  contents: read

jobs:
  migrations:
    name: Apply migrations and verify schema
    runs-on: ubuntu-latest
    timeout-minutes: 15
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: next_template
          POSTGRES_PASSWORD: postgres
          POSTGRES_USER: postgres
        options: >-
          --health-cmd "pg_isready -U postgres -d next_template"
          --health-interval 2s
          --health-timeout 3s
          --health-retries 15
        ports:
          - 5432:5432
    env:
      DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/next_template?schema=public
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          cache: npm
          node-version: 24
      - run: npm ci
      - run: npm run db:generate
      - run: npm run db:validate
      - run: npm run db:migrate:deploy
      - run: npm run db:migrate:status
      - name: Verify migration history matches the schema
        run: npm run db:migrate:check
