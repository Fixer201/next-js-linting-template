# Dependency Review — scans every PR for vulnerable dependencies.
# If a PR adds a package with a known CVE, the check fails.
# Complements npm audit (which runs on current state, not the delta).
# Docs: https://github.com/actions/dependency-review-action

name: Dependency Review
on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions: read-all

jobs:
  dependency-review:
    name: Scan dependencies
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write # post check result on PR
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.3
        with:
          persist-credentials: false

      - name: Dependency Review
        uses: actions/dependency-review-action@3b139cfc5fae8b618d3eae3675e383bb1769c019 # v4.6.0
        with:
          fail-on-severity: critical
          # Allow MIT, Apache-2.0, BSD, ISC — block unknown/copyleft
          allow-licenses: MIT, Apache-2.0, BSD-2-Clause, BSD-3-Clause, ISC, CC0-1.0, Unlicense, 0BSD
          deny-licenses: GPL-3.0, AGPL-3.0, LGPL-3.0, MPL-2.0
