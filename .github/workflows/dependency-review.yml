# Dependency Review — scans every PR for vulnerable dependencies.
# If a PR adds a package with a known CVE, the check fails.
# Complements npm audit (which runs on current state, not the delta).
# Docs: https://github.com/actions/dependency-review-action

name: Dependency Review
on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions: read-all

jobs:
  dependency-review:
    name: Scan dependencies
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Dependency Review
        uses: actions/dependency-review-action@a1d282b36b6f3519aa1f3fc636f609c47dddb294 # v5.0.0
        with:
          fail-on-severity: high
          allow-licenses: MIT, Apache-2.0, BSD-2-Clause, BSD-3-Clause, ISC, CC-BY-4.0, CC0-1.0, Unlicense, 0BSD
          # grammex 3.1.13 declares MIT, but GitHub's dependency metadata does not resolve it.
          allow-dependencies-licenses: pkg:npm/grammex@3.1.13
