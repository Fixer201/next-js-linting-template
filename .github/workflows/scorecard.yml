# OpenSSF Scorecard — automated security health audit.
# Runs weekly and on every push to main.
# Results uploaded to GitHub Security tab as SARIF.
# Docs: https://github.com/ossf/scorecard-action

name: OpenSSF Scorecard
on:
  branch_protection_rule:
  schedule:
    - cron: '30 1 * * 6' # every Saturday at 01:30 UTC
  push:
    branches: [main]
  workflow_dispatch:

# Least privilege — read-only except for security-events write
permissions: read-all

jobs:
  analysis:
    name: Scorecard analysis
    runs-on: ubuntu-latest
    permissions:
      security-events: write # upload SARIF to Security tab
      id-token: write # needed for signing results

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.3
        with:
          persist-credentials: false

      - name: Run Scorecard analysis
        uses: ossf/scorecard-action@4eaacf0543bb3f2c246792bd56e8cdeffafb205a # v2.4.3
        with:
          results_file: results.sarif
          results_format: sarif
          publish_results: true

      - name: Upload SARIF to GitHub Security tab
        uses: github/codeql-action/upload-sarif@45775bd8235c68ba998cffa5171334d58593da47 # v3.28.18
        with:
          sarif_file: results.sarif
