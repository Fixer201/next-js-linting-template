name: next-linting-template

services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: next_template
      POSTGRES_PASSWORD: postgres
      POSTGRES_USER: postgres
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d next_template']
      interval: 2s
      timeout: 3s
      retries: 15
    ports:
      - '127.0.0.1:${POSTGRES_PORT:-55432}:5432'
    volumes:
      - postgres-data:/var/lib/postgresql/data

volumes:
  postgres-data:
